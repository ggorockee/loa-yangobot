apiVersion: apps/v1
kind: Deployment
metadata:
  name: sybot
  labels:
    app: sybot
spec:
  replicas: 2
  selector:
    matchLabels:
      app: sybot
  template:
    metadata:
      labels:
        app: sybot
    spec:
      containers:
        - name: sybot
          image: sybot:latest
          ports:
            - containerPort: 8080
          env:
            - name: LOSTARK_API_KEY
              valueFrom:
                secretKeyRef:
                  name: sybot-secrets
                  key: lostark-api-key
            - name: REDIS_ADDR
              value: "redis:6379"
          resources:
            requests:
              cpu: "100m"
              memory: "64Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 5
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
---
apiVersion: v1
kind: Service
metadata:
  name: sybot
spec:
  selector:
    app: sybot
  ports:
    - port: 80
      targetPort: 8080
  type: ClusterIP
