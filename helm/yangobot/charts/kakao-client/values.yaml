enabled: true

image:
  repository: ggorockee/yangobot-kakao-client
  pullPolicy: IfNotPresent
  tag: "latest"

# yangobot 서비스 내부 URL
yanbotApiUrl: "http://yangobot"

secretName: kakao-client-secrets

resources:
  requests:
    cpu: "50m"
    memory: "128Mi"
  limits:
    cpu: "200m"
    memory: "256Mi"

persistence:
  size: 10Mi
  storageClass: ""
